[package]
name = "libmll"
version = "0.1.0"
edition = "2024"

[features]
default = []
http = ["dep:chitose"]
datetime = ["dep:chrono"]


[dependencies]
serde = { version = "1.0", features = ["derive", "rc", "serde_derive"] }
serde_json = "1.0"
regex = "1"
mlua = { version = "0.10", features = ["lua54", "vendored", "macros", "serialize", "anyhow"] }
chitose = { version = "0.1", path = "../chitose", optional = true }
chrono = { version = "0.4", features = ["serde"], optional = true }


[dependencies.uuid]
version = "1"
features = ["v4", "fast-rng", "macro-diagnostics"]
